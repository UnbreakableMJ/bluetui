# Domain terms that look like identifiers but are not, so clippy::doc_markdown
# should not demand backticks around them. `..` extends clippy's default list.
doc-valid-idents = ["BlueZ", "D-Bus", "rfkill", ".."]

# bluetui's structured CLI error (`AppError`, CLI Standard §1) is intentionally
# rich (code, message, runnable hint, timestamp, command). Allow it as a
# `Result` error variant without boxing every call site.
large-error-threshold = 256
