# Single source of truth for the Rust toolchain, honored by both rustup
# (and therefore rust-analyzer) and the Nix dev shell via
# `rust-bin.fromRustupToolchainFile` in flake.nix. Pinning one version keeps
# the two from producing incompatible artifacts in the shared target/ dir.
#
# To bump: edit `channel` here, then run `nix flake update rust-overlay`.
[toolchain]
channel = "1.96.0"
profile = "default"
